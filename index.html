<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kei Canvas Spot Finder</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#111;
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:450px;
text-align:center;
}

.logo{
width:140px;
height:140px;
object-fit:cover;
border-radius:50%;
margin:0 auto 20px;
display:block;
}

h1{
font-size:2.2rem;
margin-bottom:10px;
}

.subtitle{
color:#aaa;
margin-bottom:25px;
}

input{
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:12px;
outline:none;
text-align:center;
margin-bottom:15px;
}

button{
width:100%;
padding:16px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:12px;
cursor:pointer;
background:#fff;
color:#111;
transition:.2s;
}

button:hover{
opacity:.9;
}

#result{
margin-top:30px;
}

.spot-label{
font-size:18px;
color:#aaa;
margin-bottom:10px;
}

.spot-number{
font-size:72px;
font-weight:bold;
}

.not-found{
font-size:20px;
color:#ff6b6b;
}

.loading{
font-size:18px;
color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.jpg" class="logo" alt="Kei Canvas">

<h1>Find Your Spot</h1>

<div class="subtitle">
Enter your Username or Name
</div>

<input
type="text"
id="name"
placeholder="Username or Name">

<button onclick="findSpot()">
SEARCH
</button>

<div id="result"></div>

</div>

<script>

async function findSpot(){

const search =
document.getElementById("name").value.trim();

if(!search){
return;
}

document.getElementById("result").innerHTML =
'<div class="loading">Searching...</div>';

try{

const response = await fetch(
"https://script.google.com/macros/s/AKfycbwUWy9CMtPphjUdXIhTPfXS4Yzxk1LBLH0-CwQuUAIJHACsGMa_XEnJK26CT0upTnXtzg/exec?name="
+ encodeURIComponent(search)
);

const data = await response.json();

if(data.found){

document.getElementById("result").innerHTML = `
<div class="spot-label">
Your Spot Number
</div>

<div class="spot-number">
#${data.spot}
</div>
`;

}else{

document.getElementById("result").innerHTML = `
<div class="not-found">
Name Not Found
</div>
`;

}

}catch(error){

document.getElementById("result").innerHTML = `
<div class="not-found">
Connection Error
</div>
`;

}

}

document
.getElementById("name")
.addEventListener("keypress", function(e){

if(e.key === "Enter"){
findSpot();
}

});

</script>

</body>
</html>
