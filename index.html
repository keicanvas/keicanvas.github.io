<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kei Canvas Spot Finder</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#ffffff;
color:#222;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:380px;
text-align:center;
}

.logo{
max-width:220px;
max-height:220px;
width:auto;
height:auto;
display:block;
margin:0 auto 15px;
object-fit:contain;
}

h1{
font-size:2rem;
font-weight:700;
margin-bottom:8px;
}

.subtitle{
font-size:16px;
color:#777;
margin-bottom:22px;
}

input{
width:100%;
padding:14px;
font-size:16px;
text-align:center;
border:2px solid #e8e8e8;
border-radius:20px;
outline:none;
background:#fafafa;
margin-bottom:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

input:focus{
border-color:#d0d0d0;
}

button{
width:100%;
padding:14px;
font-size:16px;
font-weight:700;
border:none;
border-radius:20px;
background:#000;
color:#fff;
cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
transition:.2s;
}

button:hover{
opacity:.9;
}

#result{
margin-top:25px;
}

.spot-label{
font-size:18px;
color:#666;
margin-bottom:8px;
}

.spot-number{
font-size:72px;
font-weight:800;
color:#000;
line-height:1;
}

.not-found{
font-size:20px;
color:#d9534f;
font-weight:600;
}

.loading{
font-size:18px;
color:#777;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.jpg" class="logo" alt="Kei Canvas">

<h1>Find Your Spot</h1>

<div class="subtitle">
Enter your username or name
</div>

<input
type="text"
id="name"
placeholder="Username or Name">

<button onclick="findSpot()">
SEARCH
</button>

<div id="result"></div>

</div>

<script>

async function findSpot(){

const search =
document.getElementById("name").value.trim();

if(!search){
return;
}

document.getElementById("result").innerHTML =
'<div class="loading">Searching...</div>';

try{

const response = await fetch(
"https://script.google.com/macros/s/AKfycbwUWy9CMtPphjUdXIhTPfXS4Yzxk1LBLH0-CwQuUAIJHACsGMa_XEnJK26CT0upTnXtzg/exec?name="
+ encodeURIComponent(search)
);

const data = await response.json();

if(data.found){

document.getElementById("result").innerHTML = `
<div class="spot-label">
Your Spot Number
</div>

<div class="spot-number">
#${data.spot}
</div>
`;

}else{

document.getElementById("result").innerHTML = `
<div class="not-found">
Name Not Found
</div>
`;

}

}catch(error){

document.getElementById("result").innerHTML = `
<div class="not-found">
Connection Error
</div>
`;

}

}

document
.getElementById("name")
.addEventListener("keypress", function(e){

if(e.key === "Enter"){
findSpot();
}

});

</script>

</body>
</html>
