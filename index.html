<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kei Canvas Waitlist</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Baloo 2',sans-serif;
background:#ffffff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px 20px;
}

.container{
width:100%;
max-width:420px;
text-align:center;
}

.logo{
width:80px;
height:auto;
display:block;
margin:0 auto 70px;
object-fit:contain;

user-select:none;
-webkit-user-select:none;
-webkit-user-drag:none;
pointer-events:none;
}

h1{
font-size:1.25rem;
font-weight:700;
color:#8B9778;
margin-bottom:1px;
white-space:nowrap;
}

.subtitle{
font-size:.95rem;
color:#9ca18f;
margin-top:1px;
margin-bottom:22px;
}

input{
width:60%;
height:50px;
padding:0 20px;
font-size:.95rem;
border:2px solid #d8ddd0;
border-radius:999px;
background:#fff;
outline:none;
text-align:center;
color:#7f8b6c;
box-shadow:0 4px 12px rgba(0,0,0,.04);
display:block;
margin:0 auto;
}

input::placeholder{
color:#b1b6a7;
}

button{
margin:16px auto 0;
width:100px;
height:40px;
border:none;
border-radius:999px;
background:#8B9778;
color:white;
font-family:'Baloo 2',sans-serif;
font-size:.9rem;
font-weight:600;
cursor:pointer;
display:block;
box-shadow:0 6px 16px rgba(139,151,120,.25);
}

button:hover{
opacity:.9;
}

#result{
margin-top:28px;
}

.spot-label{
font-size:.95rem;
color:#8B9778;
margin-bottom:8px;
}

.spot-number{
font-size:3.5rem;
font-weight:700;
line-height:1;
color:#8B9778;
}

.not-found{
font-size:1rem;
color:#d46a6a;
}

.loading{
font-size:1rem;
color:#8B9778;
}

.footer{
margin-top:28px;
font-size:.85rem;
color:#b3b3b3;
}

</style>
</head>

<body>

<div class="container">

<img
src="logo.jpg"
class="logo"
alt="Kei Canvas"
draggable="false">

<h1>Where's My Spot? ♡</h1>

<div class="subtitle">
Enter your username or name
</div>

<input
type="text"
id="name"
placeholder="Username or Name">

<button onclick="findSpot()">
Check
</button>

<div id="result"></div>

<div class="footer">
Thank you for your patience ♡
</div>

</div>

<script>

/* Disable right click */
document.addEventListener('contextmenu', function(e){
e.preventDefault();
});

/* Disable drag */
document.addEventListener('dragstart', function(e){
e.preventDefault();
});

async function findSpot(){

const search =
document.getElementById("name").value.trim();

if(!search){
return;
}

document.getElementById("result").innerHTML =
'<div class="loading">Checking...</div>';

try{

const response = await fetch(
"https://script.google.com/macros/s/AKfycbwUWy9CMtPphjUdXIhTPfXS4Yzxk1LBLH0-CwQuUAIJHACsGMa_XEnJK26CT0upTnXtzg/exec?name="
+ encodeURIComponent(search)
);

const data = await response.json();

if(data.found){

document.getElementById("result").innerHTML = `
<div class="spot-label">
Your Waitlist Number
</div>

<div class="spot-number">
#${data.spot}
</div>
`;

}else{

document.getElementById("result").innerHTML = `
<div class="not-found">
Name Not Found
</div>
`;

}

}catch(error){

document.getElementById("result").innerHTML = `
<div class="not-found">
Connection Error
</div>
`;

}

}

document.getElementById("name")
.addEventListener("keypress", function(e){

if(e.key === "Enter"){
findSpot();
}

});

</script>

</body>
</html>
