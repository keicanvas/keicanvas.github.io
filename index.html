<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kei Canvas Spot Finder</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:450px;
text-align:center;
}

.logo{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
margin:0 auto 20px;
display:block;
}

h1{
font-size:2rem;
margin-bottom:10px;
}

.subtitle{
color:#aaa;
margin-bottom:30px;
}

input{
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:12px;
outline:none;
margin-bottom:15px;
text-align:center;
}

button{
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
background:#ffffff;
color:#111;
font-weight:bold;
}

button:hover{
opacity:.9;
}

#result{
margin-top:35px;
}

.spot{
font-size:64px;
font-weight:bold;
}

.message{
font-size:18px;
margin-top:10px;
}

.notfound{
color:#ff6b6b;
font-size:20px;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo" alt="Kei Canvas">

<h1>Find Your Spot</h1>

<div class="subtitle">
Enter your username or name
</div>

<input
id="name"
placeholder="Username or Name">

<button onclick="findSpot()">
SEARCH
</button>

<div id="result"></div>

</div>

<script>

async function findSpot(){

const search =
document.getElementById('name').value.trim();

if(!search){
return;
}

document.getElementById('result').innerHTML =
'<div class="message">Searching...</div>';

try{

const response = await fetch(
'https://script.google.com/macros/s/AKfycbwUWy9CMtPphjUdXIhTPfXS4Yzxk1LBLH0-CwQuUAIJHACsGMa_XEnJK26CT0upTnXtzg/exec?name='
+ encodeURIComponent(search)
);

const data = await response.json();

if(data.found){

document.getElementById('result').innerHTML =
`
<div class="message">Your Spot Number</div>
<div class="spot">#${data.spot}</div>
`;

}else{

document.getElementById('result').innerHTML =
`
<div class="notfound">
Name Not Found
</div>
`;

}

}catch(error){

document.getElementById('result').innerHTML =
`
<div class="notfound">
Connection Error
</div>
`;

}

}

document.getElementById('name')
.addEventListener('keypress', function(e){

if(e.key === 'Enter'){
findSpot();
}

});
</script>

</body>
</html>
