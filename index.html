<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kei Canvas Waitlist</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Baloo 2',sans-serif;
background:#ffffff;
color:#8B9778;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
}

.container{
width:100%;
max-width:420px;
text-align:center;
}

.logo{
width:130px;
height:auto;
display:block;
margin:0 auto 60px;
object-fit:contain;
}

h1{
font-size:3rem;
line-height:1;
font-weight:700;
color:#8B9778;
margin-bottom:18px;
}

.subtitle{
font-size:1.2rem;
color:#9ca18f;
margin-bottom:30px;
}

input{
width:100%;
height:62px;
padding:0 24px;
font-size:1.2rem;
border:2px solid #d8ddd0;
border-radius:999px;
background:#fff;
outline:none;
text-align:center;
color:#7f8b6c;
box-shadow:0 4px 12px rgba(0,0,0,.04);
}

input::placeholder{
color:#b1b6a7;
}

button{
margin-top:22px;
width:170px;
height:52px;
border:none;
border-radius:999px;
background:#8B9778;
color:white;
font-family:'Baloo 2',sans-serif;
font-size:1.2rem;
font-weight:600;
cursor:pointer;
box-shadow:0 6px 16px rgba(139,151,120,.25);
transition:.2s;
}

button:hover{
transform:translateY(-2px);
}

#result{
margin-top:40px;
}

.spot-label{
font-size:1.3rem;
color:#8B9778;
margin-bottom:10px;
}

.spot-number{
font-size:5rem;
font-weight:700;
line-height:1;
color:#8B9778;
}

.not-found{
font-size:1.3rem;
color:#c86b6b;
}

.loading{
font-size:1.2rem;
color:#8B9778;
}

.footer{
margin-top:30px;
font-size:1rem;
color:#b3b3b3;
}

.heart{
font-size:.9em;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.JPG" class="logo" alt="Kei Canvas">

<h1>
Check Your<br>Waitlist ♡
</h1>

<div class="subtitle">
Enter your username or name below
</div>

<input
type="text"
id="name"
placeholder="Username or Name">

<button onclick="findSpot()">
Check ✨
</button>

<div id="result"></div>

<div class="footer">
Thank you for your patience ♡
</div>

</div>

<script>

async function findSpot(){

const search =
document.getElementById("name").value.trim();

if(!search){
return;
}

document.getElementById("result").innerHTML =
'<div class="loading">Checking...</div>';

try{

const response = await fetch(
"https://script.google.com/macros/s/AKfycbwUWy9CMtPphjUdXIhTPfXS4Yzxk1LBLH0-CwQuUAIJHACsGMa_XEnJK26CT0upTnXtzg/exec?name="
+ encodeURIComponent(search)
);

const data = await response.json();

if(data.found){

document.getElementById("result").innerHTML = `
<div class="spot-label">
Your Waitlist Number ✨
</div>

<div class="spot-number">
#${data.spot}
</div>
`;

}else{

document.getElementById("result").innerHTML = `
<div class="not-found">
Name Not Found ♡
</div>
`;

}

}catch(error){

document.getElementById("result").innerHTML = `
<div class="not-found">
Connection Error
</div>
`;

}

}

document
.getElementById("name")
.addEventListener("keypress", function(e){

if(e.key === "Enter"){
findSpot();
}

});

</script>

</body>
</html>
